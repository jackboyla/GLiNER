# Learning Rate
lr_encoder: 1e-5
lr_others: 5e-5

# Training Parameters
num_steps: 30000
warmup_ratio: 0.05
train_batch_size: 8
eval_every: 5000

# Model Configuration
max_width: 12
model_name: microsoft/deberta-v3-small # hugging face model
fine_tune: true
subtoken_pooling: first
hidden_size: 768
span_mode: marker
dropout: 0.1

# Directory Paths
root_dir: ablation_backbone
train_data: "data/docred_expanded.jsonl"

# "none" if no pretrained model 
prev_path: "none"


# Training Specifics
size_sup: -1
max_types: 25  #  maximum number of relation types during training
shuffle_types: false  #true
random_drop: false # randomly drop relation types
max_neg_type_ratio: 1  # ratio of positive/negative types, 1 mean 50%/50%, 2 mean 33%/66%, 3 mean 25%/75% ...
max_len: 384

name: "small"


